- slug: ruta-del-sol-odebrecht
  nombre: "Ruta del Sol II — Odebrecht / Corficolombiana (ANI/INCO)"
  periodo: [2010, 2016]
  secop1: true
  entidades:
    - nombre: "AGENCIA NACIONAL DE INFRAESTRUCTURA"
      nit: "900.378.421"
    - nombre: "INSTITUTO NACIONAL DE CONCESIONES"
      nit: "830.118.623"
  proveedores:
    - nombre: "CONCESIONARIA RUTA DEL SOL SAS"
      nit: "900.375.170"
    - nombre: "ODEBRECHT"
      nit: null
  hint_entidad_like:
    - "%AGENCIA NACIONAL DE INFRAESTRUCTURA%"
    - "%INSTITUTO NACIONAL DE CONCESIONES%"
  resumen: >
    Contrato de concesión vial Ruta del Sol Sector 2 (2010). Odebrecht pagó
    sobornos de aproximadamente $6.5 millones USD a funcionarios colombianos
    para obtener y mantener el contrato. La Fiscalía abrió investigaciones
    contra políticos y empresarios. El contrato fue liquidado anticipadamente
    en 2017. Uno de los mayores escándalos de corrupción en infraestructura
    de Colombia.
  fuentes:
    - "https://www.fiscalia.gov.co/colombia/noticias/fiscalia-imputara-cargos-en-caso-odebrecht/"
