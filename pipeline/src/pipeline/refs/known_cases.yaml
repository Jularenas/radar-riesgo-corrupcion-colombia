    - nombre: "GRUPO NULE"
      nit: null
  hint_entidad_like:
    - "%INSTITUTO DE DESARROLLO URBANO%"
    - "%IDU%"
  resumen: >
    Red de corrupción en contratos de infraestructura vial del IDU (Bogotá).
