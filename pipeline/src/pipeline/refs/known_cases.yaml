- slug: centros-poblados
  nombre: "Contrato Centros Poblados — MinTIC"
  periodo: [2020, 2021]
  secop1: false
  entidades:
    - nombre: "FONDO UNICO DE TECNOLOGIAS DE LA INFORMACION Y LAS COMUNICACIONES"
      nit: "830.115.995"
  proveedores:
    - nombre: "UNION TEMPORAL CENTROS POBLADOS"
      nit: null
  hint_entidad_like:
    - "%FONDO UNICO DE TECNOLOGIAS%"
    - "%TECNOLOGIAS DE LA INFORMACION%"
  resumen: >
    Anticipo de $70.243 millones girado por el FONTIC al consorcio Unión
    Temporal Centros Poblados para conectividad en zonas rurales. El anticipo
    fue respaldado por garantías falsas emitidas por compañías de seguros
    inexistentes. El contrato fue liquidado sin la entrega de los servicios
    pactados. Investigaciones de la Fiscalía, Contraloría y Procuraduría.
  fuentes:
    - "https://www.fiscalia.gov.co/colombia/noticias/en-juicio-oral-caso-centros-poblados-se-busca-la-verdad/"
    - "https://www.contraloria.gov.co/centros-poblados"
    - "https://www.elespectador.com/judicial/caso-centros-poblados-todo-lo-que-se-sabe/"

