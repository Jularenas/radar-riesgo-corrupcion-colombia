name: Deploy to GitHub Pages

# Weekly incremental refresh (schedule) + on-demand full/sample rebuild
# (workflow_dispatch). GitHub Actions runners are ephemeral -- nothing
# persists between runs by default -- so `pipeline/data/raw/` (the parquet
# parts + manifest.json that `--refresh` needs to know its :updated_at
# watermark) is cached across runs below. Without that cache, `--refresh`
# would find no prior watermark and silently fall back to a full pull EVERY
# week, defeating the point. The cache is best-effort (GitHub evicts caches
# unused for 7+ days, or under total repo cache pressure); if it's ever
# missing, `--refresh` just degrades to a one-off full pull for that dataset
# instead of failing, so a lost cache costs time, not correctness.
on:
  workflow_dispatch:
    inputs:
      mode:
        description: "Data mode: 'sample' (minutes, 2023 only) or 'full' (hours, complete history)"
        type: choice
        options: [sample, full]
        default: sample
  schedule:
    - cron: "0 8 * * 0" # 08:00 UTC Sunday = 03:00 America/Bogota -- low-traffic overnight window, past week's SECOP filings are settled by then

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      MODE: ${{ inputs.mode || 'full' }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python + uv
        uses: astral-sh/setup-uv@v3
        with:
          python-version: "3.12"

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      # Restores pipeline/data/raw/ (parquet parts + manifest.json) from the
      # most recent previous run, if any. Always saves a fresh cache entry
      # afterward (unique key per run, restore-keys matches the latest prior
      # one) since this is accumulating state, not a fixed build dependency.
      - name: Restore raw data cache
        uses: actions/cache@v4
        with:
          path: pipeline/data/raw
          key: pipeline-raw-data-${{ github.run_id }}
          restore-keys: |
            pipeline-raw-data-

      - name: Run pipeline (pull -> marts -> rues -> flags -> score -> export)
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "::notice::Scheduled weekly refresh -- incremental pull, not a full re-download."
            make weekly
          elif [ "$MODE" = "full" ]; then
            echo "::notice::Full data refresh requested -- this pulls the complete SECOP II history and can take hours."
            make pull
            make pull-full
            make marts MODE=full
            make rues-coverage
            make flags
            make score
            make export
          else
            make pull
            make pull-sample
            make marts MODE=sample
            make rues-coverage
            make flags
            make score
            make export
          fi
        env:
          SOCRATA_APP_TOKEN: ${{ secrets.SOCRATA_APP_TOKEN }}

      - name: Build web app (GitHub Pages project-site base path)
        working-directory: web
        run: |
          npm install
          npm run build -- --base=/${{ github.event.repository.name }}/

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
